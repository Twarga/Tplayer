<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Tplayer — Your music library, rebuilt as a real desktop player.">
  <title>Tplayer — Your music library, rebuilt as a real desktop player.</title>
  <desc>Tplayer is a polished local-first desktop music player with YouTube import, Last.fm scrobbling, equalizer, and Linux media-key (MPRIS) support.</desc>

  <defs>
    <!-- Background: deep ink to warm charcoal -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070606"/>
      <stop offset="50%" stop-color="#0d0907"/>
      <stop offset="100%" stop-color="#15100b"/>
    </linearGradient>

    <!-- Warm glow (top-right) -->
    <radialGradient id="glowA" cx="0.82" cy="0.15" r="0.55">
      <stop offset="0%" stop-color="#d6a84f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d6a84f" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm glow (bottom-left) -->
    <radialGradient id="glowB" cx="0.08" cy="0.78" r="0.55">
      <stop offset="0%" stop-color="#63441b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#63441b" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold wordmark fill -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2cf7a"/>
      <stop offset="100%" stop-color="#d6a84f"/>
    </linearGradient>

    <!-- Bar gradient: amber at base, gold at peak -->
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d6a84f"/>
      <stop offset="100%" stop-color="#f2cf7a"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glowA)"/>
  <rect width="1280" height="320" fill="url(#glowB)"/>

  <!-- Top + bottom hairline dividers -->
  <line x1="80" y1="58" x2="1200" y2="58" stroke="rgba(242,207,122,0.16)" stroke-width="1"/>
  <line x1="80" y1="270" x2="1200" y2="270" stroke="rgba(242,207,122,0.16)" stroke-width="1"/>

  <!-- Eyebrow label -->
  <text x="80" y="50"
        font-family="'Inter','Avenir Next','Segoe UI',system-ui,Helvetica,Arial,sans-serif"
        font-size="12" font-weight="800" letter-spacing="6"
        fill="#f2cf7a" fill-opacity="0.85">
    TPLAYER · LOCAL-FIRST DESKTOP MUSIC PLAYER
  </text>

  <!-- Wordmark -->
  <text x="78" y="180"
        font-family="'Inter','Avenir Next','Segoe UI',system-ui,Helvetica,Arial,sans-serif"
        font-weight="900" font-size="130" letter-spacing="-7"
        fill="url(#gold)">
    Tplayer
  </text>

  <!-- Gold accent underscore under the wordmark -->
  <rect x="80" y="200" width="72" height="3" rx="1.5" fill="url(#gold)"/>

  <!-- Tagline -->
  <text x="80" y="238"
        font-family="'Inter','Avenir Next','Segoe UI',system-ui,Helvetica,Arial,sans-serif"
        font-size="22" font-weight="700"
        fill="#f4efe6" fill-opacity="0.88">
    Your music library, rebuilt as a real desktop player.
  </text>

  <!-- Meta strip -->
  <text x="80" y="262"
        font-family="'SFMono-Regular','Cascadia Code','Liberation Mono',ui-monospace,monospace"
        font-size="12" font-weight="700" letter-spacing="5"
        fill="#f2cf7a" fill-opacity="0.72">
    LOCAL  ·  YOUTUBE IMPORT  ·  LAST.FM  ·  MPRIS  ·  MIT
  </text>

  <!-- Equalizer bars (right side) -->
  <g fill="url(#bar)">
    <rect x="770"  y="240" width="14" height="30"  rx="3"/>
    <rect x="790"  y="212" width="14" height="58"  rx="3"/>
    <rect x="810"  y="178" width="14" height="92"  rx="3"/>
    <rect x="830"  y="140" width="14" height="130" rx="3"/>
    <rect x="850"  y="102" width="14" height="168" rx="3"/>
    <rect x="870"  y="128" width="14" height="142" rx="3"/>
    <rect x="890"  y="174" width="14" height="96"  rx="3"/>
    <rect x="910"  y="212" width="14" height="58"  rx="3"/>
    <rect x="930"  y="234" width="14" height="36"  rx="3"/>
    <rect x="950"  y="212" width="14" height="58"  rx="3"/>
    <rect x="970"  y="170" width="14" height="100" rx="3"/>
    <rect x="990"  y="130" width="14" height="140" rx="3"/>
    <rect x="1010" y="100" width="14" height="170" rx="3"/>
    <rect x="1030" y="118" width="14" height="152" rx="3"/>
    <rect x="1050" y="158" width="14" height="112" rx="3"/>
    <rect x="1070" y="202" width="14" height="68"  rx="3"/>
    <rect x="1090" y="228" width="14" height="42"  rx="3"/>
    <rect x="1110" y="218" width="14" height="52"  rx="3"/>
  </g>

  <!-- Dim trailing bars on the far right -->
  <g fill="url(#bar)" opacity="0.45">
    <rect x="1130" y="240" width="14" height="30"  rx="3"/>
    <rect x="1150" y="224" width="14" height="46"  rx="3"/>
    <rect x="1170" y="246" width="14" height="24"  rx="3"/>
    <rect x="1190" y="258" width="14" height="12"  rx="3"/>
  </g>

  <!-- Small play glyph above the bars -->
  <g transform="translate(770, 80)" opacity="0.9">
    <circle r="14" fill="none" stroke="#f2cf7a" stroke-opacity="0.6" stroke-width="1.3"/>
    <path d="M -4 -7 L 8 0 L -4 7 Z" fill="#f2cf7a"/>
  </g>
</svg>
